name: Documentation Checks

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"

  pull_request:
    paths:
      - "docs/**"
      - "README.md"

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate documentation
        run: |
          echo "Documentation changes detected."
          echo "Running documentation checks..."

