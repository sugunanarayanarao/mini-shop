name: Continuous Integration

on:

  push:

    branches:

      - main

  pull_request:

jobs:

  verify:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6

        with:
          python-version: "3.11"

      - name: Install Tools
        run: |

          python -m pip install --upgrade pip

          pip install pytest

          pip install black

          pip install ruff

          pip install pre-commit

      - name: Install json-utils
        run: |

          pip install -e external/json-utils

      - name: Install payment-sdk compiler
        run: |

          sudo apt-get update

          sudo apt-get install -y build-essential

      - name: Verify
        run: |

          make verify
